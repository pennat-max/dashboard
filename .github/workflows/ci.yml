# รันอัตโนมัติทุกครั้งที่ push / เปิด PR เข้า main
# ช่วยให้รู้ก่อนว่าโค้ด build ผ่านก่อน merge (ไม่ใช่การ deploy — deploy ตั้งใน Vercel ผูก GitHub)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build บน CI ไม่มี .env — ใส่ placeholder ให้ผ่านถ้าโค้ดอ่านตัวแปรตอน build
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build-only
